name: CI Workflow

on:
  push:
    branches:
      - Feature-BranchA
  pull_request: 
    branches:
      - main

jobs:
  ci_job:
    name: CI Job
    runs-on: ubuntu-latest
    environment: prod

    steps:
    
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Install Python version 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Create Databricks configuration profile file instead of CLI Command
        run: |
          echo "[prod]" > ~/.databrickscfg
          echo "host = ${{ secrets.HOST }}" >> ~/.databrickscfg
          echo "azure_tenant_id = ${{secrets.AZURE_TENANT_ID}}" >> ~/.databrickscfg
          echo "azure_client_id = ${{secrets.AZURE_CLIENT_ID}}" >> ~/.databrickscfg
          echo "azure_client_secret = ${{secrets.AZURE_CLIENT_SECRET}}" >> ~/.databrickscfg
      
      - name: View Databricks config file
        run: |
           cat ~/.databrickscfg

      - name: Deploy To Prod
        run: |
          databricks bundle deploy \
          --target prod \
          --profile prod
      
