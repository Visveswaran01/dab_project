# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: ed3444b5-8324-4906-bef9-569c74e3a52b

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405606524101174.14.azuredatabricks.net
    variables:
      catalog: citibike_dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-7405612707430150.10.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/vb@mngenvmcap464197.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: citibike_dev
    permissions:
      - service_principal_name: 0eb115b1-9929-46d0-ae2e-e442378f9051
        level: CAN_MANAGE
    run_as:
      service_principal_name: 0eb115b1-9929-46d0-ae2e-e442378f9051
